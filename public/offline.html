<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C79032" />
    <title>BALTHASAR · 当前离线</title>
    <style>
      :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { align-items: center; background: #fffaf2; color: #292524; display: flex; margin: 0; min-height: 100vh; padding: 24px; }
      main { margin: auto; max-width: 28rem; text-align: center; }
      .mark { background: #C79032; border-radius: 1rem; color: white; display: inline-grid; font-size: 1.5rem; height: 3.25rem; place-items: center; width: 3.25rem; }
      h1 { font-size: 1.4rem; margin: 1.25rem 0 .5rem; }
      p { color: #57534e; line-height: 1.6; }
      button { background: #C79032; border: 0; border-radius: .75rem; color: white; cursor: pointer; font: inherit; margin-top: 1rem; padding: .75rem 1.1rem; }
      button:focus-visible { outline: 3px solid #292524; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main aria-labelledby="title">
      <div class="mark" aria-hidden="true">◫</div>
      <h1 id="title">当前离线</h1>
      <p id="status" role="status">当前离线，账务操作未保存。恢复网络后可继续使用。</p>
      <button type="button" onclick="location.reload()">重试连接</button>
    </main>
    <script>
      try {
        if (localStorage.getItem("balthasar.pwa.privacy-lock") === "1") {
          document.getElementById("status").textContent = "应用已锁定，联网后完成退出。";
        }
      } catch (_) {}
    </script>
  </body>
</html>
