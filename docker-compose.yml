# docker-compose for BALTHASAR — one-command full stack (MVP "一键启动").
#
# Usage:
#   docker compose up --build    # 启动全部 (Postgres + Next.js)
#   docker compose down          # 停止
#
# Next.js app runs at http://localhost:3000
# Postgres at localhost:5432

services:
  postgres:
    image: postgres:16-alpine
    container_name: balthasar-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: balthasar
      POSTGRES_PASSWORD: balthasar
      POSTGRES_DB: balthasar
    ports:
      - "5432:5432"
    volumes:
      - balthasar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balthasar"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: balthasar-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://balthasar:balthasar@postgres:5432/balthasar
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-not-for-production-use-change-me}
      BETTER_AUTH_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  balthasar_pg_data:
