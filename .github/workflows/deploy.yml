name: Deploy

# spec-015 FR-019 双触发器分流:
#   push to main    → 滚动镜像(<short-sha> / edge)
#   push of tag v*  → version 镜像(X.Y.Z / X.Y / X / latest)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 构建期占位值 - 真实值在容器启动时由 docker-compose 注入
  BETTER_AUTH_SECRET: build-placeholder-secret-not-used-at-runtime-minlen-32
  BETTER_AUTH_URL: http://localhost:3000
  DATABASE_URL: postgres://build:build@localhost:5432/build

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 仅在 main push 或 tag push 时跑(workflow_dispatch 也允许)
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker image variables
        id: image
        run: |
          registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          version=$(jq -r .version package.json)
          short_sha=$(git rev-parse --short=8 HEAD)
          major=$(echo "$version" | cut -d. -f1)
          major_minor=$(echo "$version" | cut -d. -f1,2)
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"
          # is_tag: 'true' / 'false'(决定推送 version 还是 rolling tags)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image (version tags)
        if: steps.image.outputs.is_tag == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # tag push → X.Y.Z / X.Y / X / latest(从 package.json 读 version)
          tags: |
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.major_minor }}
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.major }}
            ${{ steps.image.outputs.registry }}/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BETTER_AUTH_SECRET=${{ env.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ env.BETTER_AUTH_URL }}
            DATABASE_URL=${{ env.DATABASE_URL }}

      - name: Build and push multi-arch image (rolling tags)
        if: steps.image.outputs.is_tag != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # main push / dispatch → <short-sha> / edge 滚动镜像
          tags: |
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.short_sha }}
            ${{ steps.image.outputs.registry }}/app:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BETTER_AUTH_SECRET=${{ env.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ env.BETTER_AUTH_URL }}
            DATABASE_URL=${{ env.DATABASE_URL }}
