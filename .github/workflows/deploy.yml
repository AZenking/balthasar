name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 构建期占位值 - 真实值在容器启动时由 docker-compose 注入
  BETTER_AUTH_SECRET: build-placeholder-secret-not-used-at-runtime-minlen-32
  BETTER_AUTH_URL: http://localhost:3000
  DATABASE_URL: postgres://build:build@localhost:5432/build

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker image variables
        id: image
        run: |
          registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          version=$(jq -r .version package.json)
          short_sha=$(git rev-parse --short=8 HEAD)
          major=$(echo "$version" | cut -d. -f1)
          major_minor=$(echo "$version" | cut -d. -f1,2)
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.major_minor }}
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.major }}
            ${{ steps.image.outputs.registry }}/app:latest
            ${{ steps.image.outputs.registry }}/app:${{ steps.image.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BETTER_AUTH_SECRET=${{ env.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ env.BETTER_AUTH_URL }}
            DATABASE_URL=${{ env.DATABASE_URL }}
